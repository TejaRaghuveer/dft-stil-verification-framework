name: DFT Verification Regression

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # Nightly
    - cron: "0 3 * * 0" # Weekly (Sunday)
  workflow_dispatch:

concurrency:
  group: dft-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  precommit_checks:
    name: Pre-commit style checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup environment
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh

      - name: Run syntax and lint checks
        run: |
          python -m compileall -q python scripts
          python scripts/doc_audit.py
          python scripts/check_coverage.py 95.0 reports/ci_precommit_coverage.json

      - name: Run unit/smoke checks
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: |
          python python/integrated_flow/week3_production.py --dry-run --out deliverables_ci_precommit

  nightly_regression:
    name: Nightly regression
    runs-on: ubuntu-latest
    needs: precommit_checks
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run nightly regression
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: |
          chmod +x scripts/run_regression.sh
          ./scripts/run_regression.sh --mode nightly --out deliverables_ci_nightly

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reports
          path: |
            deliverables_ci_nightly
            reports

      - name: Notify on nightly failure
        if: failure()
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          python scripts/notify_failure.py --channel slack --channel teams --context nightly

  weekly_extended:
    name: Weekly extended and coverage
    runs-on: ubuntu-latest
    needs: precommit_checks
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly extended suite
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: |
          chmod +x scripts/run_regression.sh
          ./scripts/run_regression.sh --mode weekly --out deliverables_ci_weekly --extended

      - name: Upload weekly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-extended-reports
          path: |
            deliverables_ci_weekly
            reports

  main_signoff:
    name: Main branch validation and sign-off
    runs-on: ubuntu-latest
    needs: precommit_checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Full validation run
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: |
          chmod +x scripts/run_regression.sh
          ./scripts/run_regression.sh --mode signoff --out deliverables_ci_signoff --extended

      - name: Create sign-off report
        run: |
          python scripts/create_sign_off_report.py --input reports/signoff_check.json --output reports/signoff_report.json

      - name: Upload sign-off artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signoff-artifacts
          path: |
            deliverables_ci_signoff
            reports

