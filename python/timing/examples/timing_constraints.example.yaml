# YAML equivalent of timing_constraints { ... } block (optional timing_constraints wrapper)
timing_constraints:
  tck_frequency_mhz: 200
  system_clock_mhz: 400
  setup_time_ns: 0.5
  hold_time_ns: 0.3
  propagation_delay_ns: 1.5
  propagation_delay_seq_ns: 1.2
  clock_slew_rate_v_per_ns: 1.0
  data_slew_rate_v_per_ns: 0.8
  clock_to_output_delay_ns: 1.6
  metastability_window_ns: 0.05
  clock_domains:
    tclock: "200 MHz"
    sysclock: "400 MHz"
    ratio: "1:2"
    phase_offset_ns: 0
